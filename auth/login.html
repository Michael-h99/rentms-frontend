<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | RentMS - Smart Property Management Ghana</title>
    <meta
      name="description"
      content="Access your RentMS dashboard to manage your properties, tenants, and MoMo payments."
    />
    <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-page dark-mode">
    <header class="auth-header">
      <div class="auth-container">
        <a href="../index.html" class="auth-logo" aria-label="RentMS Home">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="logo-icon"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span class="logo-text">RentMS</span>
        </a>
      </div>
    </header>

    <main class="auth-content">
      <div class="auth-card-wrapper">
        <section class="auth-card">
          <div class="card-intro">
            <h1>Welcome Back</h1>
            <p>Login to manage your properties and payments</p>
          </div>

          <div
            id="error-container"
            class="alert alert-danger"
            role="alert"
            aria-live="assertive"
            hidden
          >
            <span class="error-icon">⚠️</span>
            <span id="error-message">Invalid email or password.</span>
          </div>

          <form
            action="/api/auth/login"
            method="POST"
            id="login-form"
            class="auth-form"
          >
            <div class="form-group">
              <label for="email">Email Address</label>
              <div class="input-wrapper">
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="name@company.com"
                  autocomplete="email"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <div class="label-row">
                <label for="password">Password</label>
                <a href="forgot-password.html" class="forgot-link"
                  >Forgot Password?</a
                >
              </div>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  id="toggle-password"
                  class="password-toggle"
                  aria-label="Show password"
                >
                  <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="eye-icon"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="checkbox-container">
                <input type="checkbox" name="remember" id="remember" />
                <span class="checkmark"></span>
                <span class="label-text">Remember me for 30 days</span>
              </label>
            </div>

            <div class="form-actions">
              <button
                type="submit"
                class="btn btn-primary btn-block"
                id="submit-btn"
              >
                <span>Login to Dashboard</span>
                <div class="loader" hidden></div>
              </button>
            </div>
          </form>

          <footer class="card-footer">
            <p>
              Don't have an account?
              <a href="register.html" class="register-link">Register</a>
            </p>
          </footer>
        </section>

        <div class="auth-extra-info">
          <p>Securely encrypted and powered by RentMS Ghana</p>
        </div>
      </div>
    </main>

    <script src="../js/auth.js"></script>
  </body>
</html>
