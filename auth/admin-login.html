<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | RentMS</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/auth.css" />
    <style>
      /* Admin-specific overrides */
      .admin-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(220, 38, 38, 0.1);
        color: #f87171;
        border: 1px solid rgba(220, 38, 38, 0.25);
        padding: 5px 12px;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 800;
        margin-bottom: 1rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .admin-badge::before {
        content: "🔒";
        font-size: 0.8rem;
      }
      .card-intro p {
        color: #94a3b8;
        font-size: 0.9rem;
        margin-top: 0.4rem;
      }
      .btn-admin {
        background: linear-gradient(135deg, #dc2626, #991b1b) !important;
        box-shadow: 0 20px 30px -10px rgba(220, 38, 38, 0.4) !important;
      }
      .btn-admin:hover {
        filter: brightness(1.15);
      }
      .admin-warning {
        margin-top: 1.5rem;
        padding: 12px 16px;
        background: rgba(220, 38, 38, 0.06);
        border: 1px solid rgba(220, 38, 38, 0.2);
        border-radius: 10px;
        font-size: 0.78rem;
        color: #94a3b8;
        text-align: center;
        line-height: 1.5;
      }
      .admin-warning strong {
        color: #f87171;
      }
    </style>
  </head>
  <body class="auth-page dark-mode">
    <header class="auth-header">
      <div class="auth-container">
        <a href="../index.html" class="auth-logo" aria-label="RentMS Home">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="logo-icon"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span class="logo-text">RentMS</span>
        </a>
      </div>
    </header>

    <main class="auth-content">
      <div class="auth-card-wrapper">
        <section class="auth-card">
          <div class="card-intro">
            <div class="admin-badge">Admin Access</div>
            <h1>Admin Portal</h1>
            <p>Restricted area — authorised personnel only</p>
          </div>

          <!-- Error / Success banners -->
          <div
            id="error-container"
            class="alert alert-danger"
            role="alert"
            aria-live="assertive"
            hidden
          >
            <span class="error-icon">⚠️</span>
            <span id="error-message">Invalid credentials.</span>
          </div>
          <div
            id="success-container"
            class="alert alert-success"
            role="status"
            aria-live="polite"
            hidden
          >
            <span id="success-message"></span>
          </div>

          <form id="admin-login-form" class="auth-form" autocomplete="off">
            <div class="form-group">
              <label for="email">Admin Email</label>
              <div class="input-wrapper">
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="admin@rentms.com"
                  autocomplete="username"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  id="toggle-password"
                  class="password-toggle"
                  aria-label="Show password"
                >
                  <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="eye-icon"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-actions" style="margin-top: 1.5rem">
              <button
                type="submit"
                class="btn btn-primary btn-block btn-admin"
                id="submit-btn"
              >
                <span>Login to Admin</span>
                <div class="loader" hidden></div>
              </button>
            </div>
          </form>

          <div class="admin-warning">
            <strong>Restricted Access.</strong> All login attempts are logged.
            Unauthorised access is prohibited and may be prosecuted.
          </div>
        </section>

        <div class="auth-extra-info">
          <p>
            Not an admin?
            <a href="login.html" style="color: #2563eb; font-weight: 700"
              >Go to regular login →</a
            >
          </p>
        </div>
      </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
