<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcements | Tenant Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../css/tenant.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-brand">
        <a
          href="dashboard.html"
          class="d-flex align-items-center gap-2 text-decoration-none"
        >
          <i
            class="bi bi-houses-fill"
            style="font-size: 1.4rem; color: #2563eb; flex-shrink: 0"
          ></i>
          <span
            style="
              font-size: 1.1rem;
              font-weight: 800;
              color: #2563eb;
              letter-spacing: -0.02em;
            "
            >RentMS</span
          >
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a href="dashboard.html" class="nav-link"
          ><i class="bi bi-grid-1x2-fill"></i> Dashboard</a
        >
        <a href="payments.html" class="nav-link"
          ><i class="bi bi-credit-card-fill"></i> Make Payment</a
        >
        <a href="payment-history.html" class="nav-link"
          ><i class="bi bi-clock-history"></i> Payment History</a
        >
        <a href="lease.html" class="nav-link"
          ><i class="bi bi-file-text-fill"></i> My Lease</a
        >
        <div class="nav-section">Support</div>
        <a href="maintenance.html" class="nav-link"
          ><i class="bi bi-tools"></i> Maintenance</a
        >
        <a href="messages.html" class="nav-link"
          ><i class="bi bi-chat-dots-fill"></i> Messages</a
        >
        <a href="announcement.html" class="nav-link active"
          ><i class="bi bi-megaphone-fill"></i> Announcements</a
        >
        <a href="notifications.html" class="nav-link"
          ><i class="bi bi-bell-fill"></i> Notifications</a
        >
        <div class="nav-section">Account</div>
        <a href="profile.html" class="nav-link"
          ><i class="bi bi-person-fill"></i> Profile</a
        >
      </nav>
      <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2">
          <div class="s-avatar" id="sidebarAvatar">?</div>
          <div style="min-width: 0; flex: 1">
            <div
              style="
                color: var(--text-main);
                font-size: 0.85rem;
                font-weight: 700;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
              "
              id="sidebarName"
            >
              Tenant
            </div>
            <div style="color: var(--text-muted); font-size: 0.72rem">
              Tenant
            </div>
          </div>
          <a
            href="../index.html"
            style="color: var(--text-muted); flex-shrink: 0"
            title="Logout"
            ><i class="bi bi-box-arrow-right"></i
          ></a>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <span class="topbar-title">Announcements</span>
        <div class="d-flex gap-2">
          <a href="notifications.html" class="topbar-btn"
            ><i class="bi bi-bell"></i
          ></a>
          <button
            class="btn btn-outline-primary btn-sm"
            onclick="TenantAnnouncements.markAllRead()"
          >
            Mark all read
          </button>
        </div>
      </div>

      <div class="content">
        <!-- Filter tabs -->
        <ul class="nav nav-tabs mb-4" id="annTabs">
          <li class="nav-item">
            <button class="nav-link active" data-filter="all">All</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-filter="urgent">Urgent</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-filter="reminder">Reminders</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-filter="event">Events</button>
          </li>
        </ul>

        <div id="annList">
          <div class="empty-state">
            <i class="bi bi-megaphone"></i>
            <h6>No announcements</h6>
            <p>Your landlord hasn't posted anything yet</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Detail modal -->
    <div class="modal fade" id="annModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="annModalTitle">Announcement</h5>
            <button
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span id="annModalTag"></span>
              <span
                style="font-size: 0.75rem; color: var(--text-muted)"
                id="annModalDate"
              ></span>
            </div>
            <p
              id="annModalBody"
              style="
                color: var(--text-main);
                line-height: 1.7;
                font-size: 0.9rem;
              "
            ></p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/landlord.js"></script>
    <script src="../js/tenant.js"></script>
    <script>
      TenantAnnouncements.init();

      document
        .getElementById("annTabs")
        .addEventListener("click", function (e) {
          const btn = e.target.closest("[data-filter]");
          if (!btn) return;
          TenantAnnouncements.filter(btn.dataset.filter, btn);
        });
    </script>
  </body>
</html>
