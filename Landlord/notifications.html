<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications | Landlord Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../css/landlord.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      .sidebar-toggle {
        display: none;
        background: none;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        width: 36px;
        height: 36px;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        cursor: pointer;
        flex-shrink: 0;
        font-family: inherit;
      }
      .sidebar-toggle:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 999;
      }
      .sidebar-overlay.show {
        display: block;
      }
      @media (max-width: 992px) {
        .sidebar {
          transform: translateX(-100%);
          transition: transform 0.3s ease;
          z-index: 1000;
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .sidebar-toggle {
          display: flex !important;
        }
        .main {
          margin-left: 0 !important;
        }
        .topbar {
          padding: 0 14px !important;
          height: 56px;
        }
        .content {
          padding: 14px !important;
        }
      }
      @media (max-width: 576px) {
        .topbar .btn {
          font-size: 0.75rem;
          padding: 0.3rem 0.6rem;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="sidebar-overlay"
      id="sidebarOverlay"
      onclick="closeSidebar()"
    ></div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <a
          href="dashboard.html"
          class="d-flex align-items-center gap-2 text-decoration-none"
        >
          <i
            class="bi bi-houses-fill"
            style="font-size: 1.4rem; color: #2563eb; flex-shrink: 0"
          ></i>
          <span
            style="
              font-size: 1.1rem;
              font-weight: 800;
              color: #2563eb;
              letter-spacing: -0.02em;
              line-height: 1;
            "
            >RentMS</span
          >
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a href="dashboard.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-grid-1x2-fill"></i> Dashboard</a
        >
        <a href="plazas.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-buildings"></i> My Plazas</a
        >
        <a href="tenants.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-people-fill"></i> Tenants</a
        >
        <a href="payments.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-credit-card-fill"></i> Payments</a
        >
        <div class="nav-section">Management</div>
        <a href="invite-codes.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-key-fill"></i> Invite Codes</a
        >
        <a href="maintenance.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-tools"></i> Maintenance</a
        >
        <a href="messages.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-chat-dots-fill"></i> Messages</a
        >
        <a href="announcement.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-megaphone-fill"></i> Announcements</a
        >
        <a
          href="notifications.html"
          class="nav-link active"
          onclick="closeSidebar()"
          ><i class="bi bi-bell-fill"></i> Notifications</a
        >
        <div class="nav-section">Reports</div>
        <a href="reports.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-bar-chart-fill"></i> Reports</a
        >
        <div class="nav-section">Account</div>
        <a href="profile.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-person-fill"></i> Profile</a
        >
        <a href="settings.html" class="nav-link" onclick="closeSidebar()"
          ><i class="bi bi-gear-fill"></i> Settings</a
        >
      </nav>
      <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2">
          <div class="s-avatar" id="sidebarAvatar">?</div>
          <div style="min-width: 0; flex: 1">
            <div
              style="
                color: var(--text-main);
                font-size: 0.85rem;
                font-weight: 700;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
              "
              id="sidebarName"
            >
              Landlord
            </div>
            <div style="color: var(--text-muted); font-size: 0.72rem">
              Landlord
            </div>
          </div>
          <a
            href="../index.html"
            style="color: var(--text-muted); flex-shrink: 0"
            title="Logout"
            ><i class="bi bi-box-arrow-right"></i
          ></a>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="topbar d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <button
            class="sidebar-toggle"
            onclick="openSidebar()"
            aria-label="Open menu"
          >
            <i class="bi bi-list" style="font-size: 1.2rem"></i>
          </button>
          <span class="topbar-title">Notifications</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span
            style="font-size: 0.8rem; color: var(--text-muted)"
            id="unreadLabel"
          ></span>
          <button
            class="btn btn-sm btn-outline-secondary"
            onclick="markAllRead()"
          >
            Mark all read
          </button>
        </div>
      </div>

      <div class="content">
        <div class="d-flex gap-2 mb-4 flex-wrap">
          <button class="btn btn-sm btn-primary" onclick="filter('all', this)">
            All
          </button>
          <button
            class="btn btn-sm btn-outline-secondary"
            onclick="filter('payment', this)"
          >
            Payments
          </button>
          <button
            class="btn btn-sm btn-outline-secondary"
            onclick="filter('maintenance', this)"
          >
            Maintenance
          </button>
          <button
            class="btn btn-sm btn-outline-secondary"
            onclick="filter('general', this)"
          >
            General
          </button>
        </div>
        <div class="card" id="notifContainer"></div>
        <div id="emptyState" class="empty-state" style="display: none">
          <i class="bi bi-bell"></i>
          <h6 style="font-weight: 700; color: var(--text-main)">
            No notifications yet
          </h6>
          <p>Notifications will appear here as activity happens.</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/landlord.js"></script>
    <script>
      LandlordNotifications.init();
      function openSidebar() {
        document.getElementById("sidebar").classList.add("open");
        document.getElementById("sidebarOverlay").classList.add("show");
        document.body.style.overflow = "hidden";
      }
      function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebarOverlay").classList.remove("show");
        document.body.style.overflow = "";
      }
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof DEV_MODE !== "undefined" && !DEV_MODE) {
          const b = document.getElementById("devBanner");
          if (b) b.remove();
        }
      });
    </script>
  </body>
</html>
