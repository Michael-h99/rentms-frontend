<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Plazas | Landlord Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../css/landlord.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-brand">
        <a
          href="dashboard.html"
          class="d-flex align-items-center gap-2 text-decoration-none"
        >
          <i
            class="bi bi-houses-fill"
            style="font-size: 1.4rem; color: #2563eb; flex-shrink: 0"
          ></i>
          <span
            style="
              font-size: 1.1rem;
              font-weight: 800;
              color: #2563eb;
              letter-spacing: -0.02em;
              line-height: 1;
            "
            >RentMS</span
          >
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a href="dashboard.html" class="nav-link"
          ><i class="bi bi-grid-1x2-fill"></i> Dashboard</a
        >
        <a href="plazas.html" class="nav-link active"
          ><i class="bi bi-buildings"></i> My Plazas</a
        >
        <a href="tenants.html" class="nav-link"
          ><i class="bi bi-people-fill"></i> Tenants</a
        >
        <a href="payments.html" class="nav-link"
          ><i class="bi bi-credit-card-fill"></i> Payments</a
        >
        <div class="nav-section">Management</div>
        <a href="invite-codes.html" class="nav-link"
          ><i class="bi bi-key-fill"></i> Invite Codes</a
        >
        <a href="maintenance.html" class="nav-link"
          ><i class="bi bi-tools"></i> Maintenance</a
        >
        <a href="messages.html" class="nav-link"
          ><i class="bi bi-chat-dots-fill"></i> Messages</a
        >
        <a href="announcement.html" class="nav-link"
          ><i class="bi bi-megaphone-fill"></i> Announcements</a
        >
        <a href="notifications.html" class="nav-link"
          ><i class="bi bi-bell-fill"></i> Notifications</a
        >
        <div class="nav-section">Reports</div>
        <a href="reports.html" class="nav-link"
          ><i class="bi bi-bar-chart-fill"></i> Reports</a
        >
        <div class="nav-section">Account</div>
        <a href="profile.html" class="nav-link"
          ><i class="bi bi-person-fill"></i> Profile</a
        >
        <a href="settings.html" class="nav-link"
          ><i class="bi bi-gear-fill"></i> Settings</a
        >
      </nav>
      <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2">
          <div class="s-avatar" id="sidebarAvatar">?</div>
          <div style="min-width: 0; flex: 1">
            <div
              style="
                color: var(--text-main);
                font-size: 0.85rem;
                font-weight: 700;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
              "
              id="sidebarName"
            >
              Landlord
            </div>
            <div style="color: var(--text-muted); font-size: 0.72rem">
              Landlord
            </div>
          </div>
          <a
            href="../index.html"
            style="color: var(--text-muted); flex-shrink: 0"
            title="Logout"
            ><i class="bi bi-box-arrow-right"></i
          ></a>
        </div>
      </div>
    </div>
    <!-- end .sidebar -->

    <div class="main">
      <div class="topbar">
        <span class="topbar-title">My Plazas</span>
        <div class="d-flex align-items-center gap-2">
          <a href="notifications.html" class="topbar-btn"
            ><i class="bi bi-bell"></i
          ></a>
          <button
            class="btn btn-primary btn-sm px-3"
            data-bs-toggle="modal"
            data-bs-target="#plazaModal"
          >
            <i class="bi bi-plus-lg me-1"></i> New Plaza
          </button>
        </div>
      </div>

      <div class="content">
        <!-- Search -->
        <div class="card mb-4 p-3">
          <div class="row g-2 align-items-center">
            <div class="col-md-5">
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"
                  ><i class="bi bi-search text-muted"></i
                ></span>
                <input
                  type="text"
                  class="form-control border-start-0"
                  placeholder="Search plazas..."
                  id="searchInput"
                  oninput="filterPlazas()"
                />
              </div>
            </div>
            <div class="col-md-3">
              <select
                class="form-select"
                id="filterStatus"
                onchange="filterPlazas()"
              >
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
            <div class="col-auto ms-auto">
              <span class="text-muted" style="font-size: 0.85rem"
                ><span id="plazaCount">0</span> plazas</span
              >
            </div>
          </div>
        </div>

        <!-- Grid -->
        <div class="row g-3" id="plazaGrid">
          <!-- Populated by JS -->
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="empty-state">
          <i class="bi bi-buildings"></i>
          <h6 style="font-weight: 700; color: var(--text-main)">
            No plazas yet
          </h6>
          <p>Click "New Plaza" to add your first property.</p>
          <button
            class="btn btn-primary mt-2"
            data-bs-toggle="modal"
            data-bs-target="#plazaModal"
          >
            <i class="bi bi-plus-lg me-1"></i> Add Plaza
          </button>
        </div>
      </div>
    </div>

    <!-- Plaza Modal -->
    <div class="modal fade" id="plazaModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="plazaModalTitle">
              Add New Plaza
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-4">
            <input type="hidden" id="editPlazaId" />
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size: 0.875rem"
                >Plaza Name *</label
              ><input
                type="text"
                class="form-control"
                id="plazaName"
                placeholder="e.g. Accra Heights"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size: 0.875rem"
                >Location *</label
              ><input
                type="text"
                class="form-control"
                id="plazaLocation"
                placeholder="e.g. East Legon, Accra"
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size: 0.875rem"
                >Total Units *</label
              ><input
                type="number"
                class="form-control"
                id="plazaUnits"
                placeholder="e.g. 10"
                min="1"
              />
            </div>
            <div
              id="plazaError"
              class="text-danger"
              style="font-size: 0.8rem; display: none"
            ></div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-primary px-4" onclick="savePlaza()">
              Save Plaza
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/landlord.js"></script>
    <script>
      LandlordPlazas.init();
    </script>
    <!-- DEV MODE BANNER — remove when going live -->
    <div
      id="devBanner"
      style="
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        background: #f59e0b;
        color: #000;
        font-size: 0.75rem;
        font-weight: 700;
        text-align: center;
        padding: 5px;
        letter-spacing: 0.05em;
      "
    ></div>
    <script>
      // Hide banner automatically when DEV_MODE is off
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof DEV_MODE !== "undefined" && !DEV_MODE) {
          const b = document.getElementById("devBanner");
          if (b) b.remove();
        }
      });
    </script>
  </body>
</html>
